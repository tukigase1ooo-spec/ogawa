<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGAWA ADMIN</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#050505;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:'Helvetica Neue',sans-serif;
    background-image:
      linear-gradient(rgba(249,0,145,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(249,0,145,.03) 1px,transparent 1px);
    background-size:60px 60px;
  }
  .msg{
    text-align:center;
    font-size:.7rem;letter-spacing:.3em;
    color:rgba(255,255,255,.35);
  }
  .logo{
    font-family:Georgia,serif;
    font-size:1rem;letter-spacing:.42em;
    color:rgba(255,255,255,.7);
    margin-bottom:16px;
  }
  .logo span{color:#f90091;}
</style>
</head>
<body>
<div class="msg">
  <div class="logo">OGA<span>WA</span> ADMIN</div>
  <div>PROCESSING...</div>
</div>
<script>
  netlifyIdentity.on('init', function(user){
    if(user) window.location.replace('/admin.html');
    /* recovery_token / invite_token がある場合はウィジェットが自動でフォームを表示する
       open() を呼ぶとログイン画面が上書きされるため何もしない */
  });

  netlifyIdentity.on('login', function(){
    netlifyIdentity.close();
    window.location.replace('/admin.html');
  });

  netlifyIdentity.init();
</script>
</body>
</html>
